<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#cc785c" />
  <title>离线模式 - Java面试宝典</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #faf9f5 0%, #f5f0e8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      background: #cc785c;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 8px 32px rgba(204, 120, 92, 0.3);
    }
    .icon svg {
      width: 48px;
      height: 48px;
      color: white;
    }
    h1 {
      font-size: 24px;
      color: #1a1a2e;
      margin-bottom: 12px;
      font-weight: 600;
    }
    p {
      font-size: 16px;
      color: #666;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #cc785c;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
    }
    .btn:hover {
      background: #b56a50;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(204, 120, 92, 0.4);
    }
    .info {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #e0e0e0;
    }
    .info-text {
      font-size: 14px;
      color: #999;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    </div>
    <h1>您处于离线状态</h1>
    <p>请检查网络连接后重试。已缓存的内容仍可以访问。</p>
    <button class="btn" onclick="window.location.reload()">重新加载</button>
    <div class="info">
      <p class="info-text">Java面试宝典</p>
      <p class="info-text">随时随地刷题，轻松应对面试</p>
    </div>
  </div>
</body>
</html>
